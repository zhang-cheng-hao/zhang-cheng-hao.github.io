short_bio: >-
  <p>
    I am a master's student in Software Engineering at Tsinghua University,
    expected to graduate in 2027. I also received my B.Eng. in Software
    Engineering from Tsinghua University.
  </p>
  <p>
    My interests center on LLM-driven representation learning: how to use the
    semantic understanding and world knowledge of LLMs/VLMs to learn
    transferable, compressible user/item embeddings for retrieval and
    recommendation.
  </p>
  <p>
    I am particularly interested in representation alignment under weak or
    implicit supervision, and in jointly training embeddings with contrastive
    objectives and SFT/generative objectives so that they retain semantic
    knowledge while absorbing collaborative signals from retrieval and
    recommendation. My earlier work also studies disentangled representation
    learning and cross-domain generalization for graph and molecular tasks.
  </p>

