short_bio: >-
  <p>
    I am a master's student in Software Engineering at the School of Software,
    Tsinghua University, expected to graduate in 2027. I received my B.Eng. in
    Software Engineering from Tsinghua University.
  </p>
  <p>
    I study LLM-supervised retrieval learning: how language and vision-language
    models can teach retrievers from the evidence they read and use, moving
    beyond explicit relevance labels and short-passage matching. My current work
    focuses on reading policies, evidence exposure, retrieval-label-free
    multimodal retrieval, and LLM-enhanced recommendation.
  </p>
  <p>
    I am seeking research internship opportunities in LLM algorithms and will
    graduate in 2027.
  </p>

