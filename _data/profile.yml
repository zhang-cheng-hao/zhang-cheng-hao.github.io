short_bio: >-
  <p>
    I am a master's student in Software Engineering at the School of Software,
    Tsinghua University, advised by Prof. Xibin Zhao. I received my B.Eng. in
    Software Engineering from Tsinghua University.
  </p>
  <p>
    My research interests include graph machine learning, LLM safety,
    recommendation and retrieval systems, and evaluation-centered machine
    learning engineering. I am particularly interested in cross-domain
    few-shot graph learning, evidence-grounded question answering, and
    reproducible evaluation protocols for real systems.
  </p>
  <p>
    I am open to 2026 research / algorithm internships and full-time roles.
  </p>

